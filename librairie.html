<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReligiS - Librairie</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-info {
            font-size: 13px;
            opacity: 0.9;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            display: flex;
            height: calc(100vh - 70px);
        }

        /* SIDEBAR - 1/3 */
        .sidebar {
            width: 33.33%;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            background: #f9f9f9;
        }

        .sidebar-header h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .search-box {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 8px;
            scroll-behavior: smooth;
        }

        .filter-group::-webkit-scrollbar {
            height: 4px;
        }

        .filter-group::-webkit-scrollbar-track {
            background: transparent;
        }

        .filter-group::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 2px;
        }

        .filter-group::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }

        .filter-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            border-color: #667eea;
        }

        .content-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .content-item {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .content-item:hover {
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            padding-left: 17px;
        }

        .content-item.active {
            background: #f0f0ff;
            border-left: 3px solid #667eea;
            padding-left: 17px;
        }

        .content-item-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .content-item-meta {
            font-size: 12px;
            color: #999;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .content-item-meta span {
            display: inline-block;
        }

        .loading-sidebar {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* MAIN CONTENT - 2/3 */
        .main-content {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #999;
        }

        .preview-empty svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .preview-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .preview-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .preview-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .preview-source {
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
        }

        .preview-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
            align-items: start;
        }

        .meta-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .meta-image {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .meta-image img {
            max-width: 100%;
            max-height: 120px;
            object-fit: contain;
        }

        .meta-label {
            font-size: 10px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .meta-value {
            font-size: 12px;
            color: #333;
            font-weight: 500;
        }

        .meta-value.date {
            font-size: 11px;
            color: #666;
        }

        .type-badge {
            display: inline-block;
            padding: 3px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .btn-download {
            background: #48bb78;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            background: #38a169;
        }

        .message {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .message.info {
            background: #eef;
            color: #33c;
            border: 1px solid #ccf;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .preview-meta-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
            }

            .sidebar {
                width: 100%;
                max-height: 300px;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }

            .main-content {
                width: 100%;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }
        }

        .content-item::-webkit-scrollbar {
            width: 6px;
        }

        .content-item::-webkit-scrollbar-track {
            background: transparent;
        }

        .content-item::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .content-item::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }

        .no-results {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <h1>📚 ReligiS - Librairie</h1>
        <div class="header-right">
            <div class="user-info">
                <span id="userDisplay">Invité</span>
            </div>
            <button class="btn-logout" id="btnHome">🏠 Accueil</button>
            <button class="btn-logout" id="btnLogout">Déconnexion</button>
        </div>
    </div>

    <!-- LAYOUT PRINCIPAL -->
    <div class="container">
        <!-- SIDEBAR - 1/3 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Contenus</h2>
                <input type="text" class="search-box" id="searchBox" placeholder="Rechercher un sujet...">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="ALL">Tous</button>
                    <button class="filter-btn" data-filter="DOC">documents</button>
                    <button class="filter-btn" data-filter="DATABASE">données</button>
                    <button class="filter-btn" data-filter="MULTIMEDIA">multimedia</button>
                    <button class="filter-btn" data-filter="PAGE WEB">web</button>
                </div>
            </div>

            <div class="message" id="messageBox"></div>

            <div id="contentList" class="content-list">
                <div class="loading-sidebar">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px; font-size: 13px;">Chargement des contenus...</p>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT - 2/3 -->
        <div class="main-content">
            <div id="previewContainer" class="preview-empty">
                <div>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                    <p>Sélectionnez un contenu pour afficher les détails</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===========================
        // CONFIGURATION SUPABASE
        // ===========================
        const SUPABASE_URL = 'https://rkxaprpcetborlslblqj.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NpdAjISRkvlmuO6cY3xljA_79dxiqkZ';


        // ===========================
        // INITIALISATION CLIENT ET ÉTAT
        // ===========================
        let sbClient = null;
        let allContents = [];
        let filteredContents = [];
        let selectedContent = null;
        let currentFilter = 'ALL';

        function initSupabaseClient() {
            try {
                sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('[SUPABASE] Client initialisé avec succès');
                return true;
            } catch (error) {
                console.error('[SUPABASE] Erreur lors de l\'initialisation du client:', error);
                showMessage('Erreur de connexion au serveur. Vérifiez votre configuration Supabase.', 'error');
                return false;
            }
        }

        // ===========================
        // UTILITY FUNCTIONS
        // ===========================
        function showMessage(text, type = 'info') {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';

            if (type !== 'error') {
                setTimeout(() => {
                    messageBox.style.display = 'none';
                }, 3000);
            }
        }

        function formatDate(dateString) {
            // Si la date est nulle, undefined ou vide, on retourne un texte par défaut
            if (!dateString) {
                return "Date inconnue";
            }

            const date = new Date(dateString);

            // Vérifie si la date est valide (le "is finite" de l'erreur)
            if (isNaN(date.getTime())) {
                return "Date invalide";
            }

            // Retourne le format souhaité (adaptez selon vos besoins)
            return date.toLocaleDateString('fr-FR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        function getImageForType(type1) {
            const typeMap = {
                'DATABASE': './img/lib/table.png',
                'DOC': './img/lib/texte.png',
                'MULTIMEDIA': './img/lib/video.jpg',
                'PAGE WEB': './img/lib/website.jpg'
            };
            return typeMap[type1] || '';
        }

        function loadUserSession() {
            const PRENOM = sessionStorage.getItem('user_PRENOM') || 'Invité';
            const NOM = sessionStorage.getItem('user_NOM') || '';
            const isGuest = sessionStorage.getItem('user_is_guest') === 'true';
            
            const displayName = isGuest ? `${PRENOM} ${NOM} (Invité)` : `${PRENOM} ${NOM}`;
            document.getElementById('userDisplay').textContent = displayName;
        }

        // ===========================
        // LOGIQUE MÉTIER : Charger les contenus
        // ===========================
        async function loadContents() {
            try {
                console.log('[CONTENUS] Chargement des contenus de Supabase');

                const { data, error } = await sbClient
                    .from('CONTENUS')
                    .select('REF, SUJET, URL, TYPE, TYPE1, TYPE2, DATE_PUBLICATION, DATE_COLLECTE, SOURCE')
                    .order('DATE_COLLECTE', { ascending: false });

                if (error) {
                    console.error('[SUPABASE ERROR]', error);
                    showMessage('Erreur lors du chargement des contenus.', 'error');
                    return false;
                }

                console.log(`[CONTENUS] ${data.length} contenus chargés`);
                allContents = data || [];
                filteredContents = allContents;

                renderContentList();

                return true;

            } catch (err) {
                console.error('[ERREUR FATALE]', err);
                showMessage('Une erreur inattendue est survenue.', 'error');
                return false;
            }
        }

        // ===========================
        // LOGIQUE MÉTIER : Filtrer et afficher les contenus
        // ===========================
        function applyFilters() {
            let filtered = allContents;

            // Filtre par type
            if (currentFilter !== 'ALL') {
                filtered = filtered.filter(item => {
                    return item.TYPE1 === currentFilter || item.TYPE2 === currentFilter;
                });
            }

            // Filtre par recherche
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(item => {
                    return item.SUJET.toLowerCase().includes(searchTerm) ||
                           item.SOURCE.toLowerCase().includes(searchTerm);
                });
            }

            filteredContents = filtered;
            renderContentList();
        }

        function renderContentList() {
            const contentList = document.getElementById('contentList');

            if (filteredContents.length === 0) {
                contentList.innerHTML = '<div class="no-results"><p>Aucun contenu trouvé</p></div>';
                return;
            }

            contentList.innerHTML = filteredContents.map(content => `
                <div class="content-item ${selectedContent?.REF === content.REF ? 'active' : ''}" 
                     data-ref="${content.REF}">
                    <div class="content-item-title">${content.SUJET}</div>
                    <div class="content-item-meta">
                        <span>${content.SOURCE}</span>
                        <span>•</span>
                        <span>${formatDate(content.DATE_COLLECTE)}</span>
                    </div>
                </div>
            `).join('');

            // Ajouter les event listeners
            contentList.querySelectorAll('.content-item').forEach(item => {
                item.addEventListener('click', () => {
                    const ref = item.getAttribute('data-ref');
                    selectContent(ref);
                });
            });
        }

        // ===========================
        // LOGIQUE MÉTIER : Sélectionner et afficher un contenu
        // ===========================
        function selectContent(ref) {
            selectedContent = allContents.find(c => c.REF === ref);
            
            if (!selectedContent) return;

            console.log('[SELECTION] Contenu sélectionné:', selectedContent.REF);

            // Mettre à jour le sidebar
            renderContentList();

            // Mettre à jour le preview
            renderPreview();
        }

        function renderPreview() {
            if (!selectedContent) return;

            const previewContainer = document.getElementById('previewContainer');

            const typesList = [selectedContent.TYPE1, selectedContent.TYPE2]
                .filter(Boolean)
                .map(t => `<span class="type-badge">${t}</span>`)
                .join('');

            const imageUrl = getImageForType(selectedContent.TYPE1);
            const imageHtml = imageUrl ? `<img src="${imageUrl}" alt="${selectedContent.TYPE1}">` : '';

            const html = `
                <div class="preview-container">
                    <div class="message" id="previewMessage"></div>

                    <div class="preview-header">
                        <h1 class="preview-title">${selectedContent.SUJET}</h1>
                        <p class="preview-source">📌 Source: <strong>${selectedContent.SOURCE}</strong></p>
                    </div>

                    <div class="preview-meta-grid">
                        <div>
                            <div class="meta-item">
                                <div class="meta-label">Type de contenu</div>
                                <div class="meta-value">${typesList}</div>
                            </div>
                            <div class="meta-item" style="margin-top: 12px;">
                                <div class="meta-label">Date de publication</div>
                                <div class="meta-value date">${formatDate(selectedContent.DATE_PUBLICATION)}</div>
                            </div>
                        </div>
                        <div class="meta-image">
                            ${imageHtml}
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-primary" id="btnOpenResource">
                            ➜ Aller à la ressource
                        </button>
                        <button class="btn-secondary" id="btnCopyLink">
                            📋 Copier le lien
                        </button>
                    </div>
                </div>
            `;

            previewContainer.innerHTML = html;

            // Event listeners pour les boutons
            document.getElementById('btnOpenResource').addEventListener('click', () => {
                if (selectedContent.URL) {
                    window.open(selectedContent.URL, '_blank');
                }
            });

            document.getElementById('btnCopyLink').addEventListener('click', () => {
                const messageBox = document.getElementById('previewMessage');
                navigator.clipboard.writeText(selectedContent.URL).then(() => {
                    messageBox.textContent = '✓ Lien copié !';
                    messageBox.className = 'message success';
                    messageBox.style.display = 'block';
                    setTimeout(() => {
                        messageBox.style.display = 'none';
                    }, 2000);
                });
            });
        }

        // ===========================
        // LOGIQUE MÉTIER : Télécharger en CSV
        // ===========================
        function downloadAsCSV() {
            try {
                console.log('[EXPORT] Téléchargement des contenus en CSV');

                const headers = ['REF', 'SUJET', 'SOURCE', 'TYPE', 'TYPE1', 'TYPE2', 'DATE_PUBLICATION', 'DATE_COLLECTE', 'URL'];
                
                const csvData = [
                    headers.join(','),
                    ...filteredContents.map(item =>
                        [
                            item.REF,
                            `"${(item.SUJET || '').replace(/"/g, '""')}"`,
                            `"${(item.SOURCE || '').replace(/"/g, '""')}"`,
                            item.TYPE || '',
                            item.TYPE1 || '',
                            item.TYPE2 || '',
                            item.DATE_PUBLICATION || '',
                            item.DATE_COLLECTE || '',
                            item.URL || ''
                        ].join(',')
                    )
                ].join('\n');

                const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                
                link.setAttribute('href', url);
                link.setAttribute('download', `ReligiS_Contenus_${new Date().toISOString().slice(0, 10)}.csv`);
                link.style.visibility = 'hidden';
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showMessage('✓ Export CSV téléchargé avec succès', 'success');

            } catch (err) {
                console.error('[EXPORT ERROR]', err);
                showMessage('Erreur lors de l\'export.', 'error');
            }
        }

        // ===========================
        // GESTIONNAIRES D'ÉVÉNEMENTS
        // ===========================
        document.getElementById('searchBox').addEventListener('input', () => {
            applyFilters();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                applyFilters();
            });
        });

        document.getElementById('btnHome').addEventListener('click', () => {
            window.location.href = 'dashboard.html';
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            sessionStorage.clear();
            window.location.href = 'index.html';
        });

        // ===========================
        // INITIALISATION À LA CHARGE
        // ===========================
        window.addEventListener('DOMContentLoaded', async () => {
            console.log('[INIT] Initialisation de la page Librairie');

            loadUserSession();

            if (!initSupabaseClient()) {
                showMessage('Configuration Supabase incomplète.', 'error');
                return;
            }

            await loadContents();

            console.log('[INIT] Page Librairie prête');
        });
    </script>
    <!-- Inclusion du SDK Supabase via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
